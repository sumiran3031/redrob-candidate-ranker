  pre_computation_time_minutes: 0

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage CPU-only ranker. Stage 1 computes a JD-fit base score from five
  components: TF-IDF cosine similarity to the JD (15%), required skill match
  weighted by proficiency and duration (30%), role/career fit including explicit
  penalties for consulting-only backgrounds and unrelated titles (22%), location
  fit for Pune/Noida preference (8%), and career quality signals including GitHub
  activity, assessment scores, endorsements, and education tier (17%). Stage 2
  applies a behavioral availability multiplier derived from last-active recency,
  open-to-work flag, recruiter response rate, notice period, and interview
  completion rate. The multiplier is applied as a product (not addition) so a
  ghost candidate cannot float to the top regardless of skill fit. Honeypots are
  caught by timeline consistency checks and impossibly high expert-proficiency
  with zero months of usage. Runtime: ~90 seconds for 100k candidates on CPU.

